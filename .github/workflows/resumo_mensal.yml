name: Resumo Mensal de Despesas

on:
  schedule:
    - cron: '0 8 1 * *'
  workflow_dispatch:

jobs:
  enviar-resumo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests gspread google-auth google-auth-oauthlib google-auth-httplib2 python-dateutil

      - name: Restaurar token do Google
        run: echo "${{ secrets.GOOGLE_TOKEN }}" | base64 --decode > token.pickle

      - name: Correr o bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python main.py